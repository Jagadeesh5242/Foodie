<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook With What You Have • Ruchique</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--primary:#9B1C31;
--accent:#FF9933;
--cream:#FFF8E7;
--dark:#1a1a1a;
}

body{
font-family:Poppins;
margin:0;
background:var(--cream);
color:var(--dark);
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
}

.logo{
font-family:'Playfair Display';
font-size:28px;
color:var(--primary);
font-weight:900;
}

.nav-links a{
margin-left:20px;
text-decoration:none;
color:var(--primary);
font-weight:600;
border:2px solid var(--primary);
padding:8px 18px;
border-radius:25px;
transition:.3s;
}

.nav-links a:hover{
background:var(--primary);
color:white;
}

.hero{
text-align:center;
padding:80px 20px 30px;
}

.hero h1{
font-family:'Playfair Display';
font-size:46px;
color:var(--primary);
}

.ingredients{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
max-width:900px;
margin:auto;
padding:20px;
}

.ing{
background:white;
padding:12px 16px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
cursor:pointer;
}

.ing input{
margin-right:8px;
}

.find-btn{
display:block;
margin:30px auto;
padding:14px 35px;
border:none;
background:var(--accent);
color:white;
border-radius:30px;
font-weight:600;
cursor:pointer;
}

.find-btn:hover{
background:var(--primary);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,260px));
justify-content:center;
gap:30px;
padding:20px 40px 80px;
max-width:1300px;
margin:auto;
}

.card{
background:white;
border-radius:22px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.12);
cursor:pointer;
display:none;
transition:transform .3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.card h3{
font-family:'Playfair Display';
color:var(--primary);
margin:0;
}

.match{
position:absolute;
background:#4CAF50;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
top:10px;
right:10px;
}

#noResults{
text-align:center;
padding:60px;
display:none;
}

.footer{
text-align:center;
padding:40px;
background:white;
}

</style>

</head>

<body>

<div class="navbar">
<div class="logo">🍽️ RUCHIQUE</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/browse">Browse Recipes</a>
<a href="/ingredients">Cook with what you have</a>
<a href="/about">About</a>
</div>
</div>

<section class="hero">
<h1>Cook With What You Have</h1>
<p>Select ingredients available in your kitchen</p>
</section>

<div class="ingredients" id="ingredients"></div>

<button class="find-btn" onclick="findRecipes()">Find Recipes</button>

<div class="grid" id="recipeGrid"></div>

<div id="noResults">
<h2>No matching recipes 😕</h2>
<p>Try selecting fewer ingredients</p>
</div>

<div class="footer">
© Ruchique 2026 • Discover & Cook
</div>

<script>

/* RECIPES DATABASE */

const recipes=[

{
slug:"chicken-biryani",
name:"Chicken Biryani",
image:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFIENTSeyaVBUA5Yfh1HT8iJMWy1raKxxlJQ&s",
ingredients:["chicken","rice","onion","tomato","yogurt"]
},

{
slug:"paneer-butter-masala",
name:"Kaju Paneer Butter Masala",
image:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT85iSF9VSvP3JREyzT2L40ZuxDcpcqegj5IQ&s",
ingredients:["paneer","tomato","onion","butter","cream"]
},

{
slug:"masala-dosa",
name:"Masala Dosa",
image:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmyC7uis1FdyUpZW9h4OEQYOM9NDbXozIfVg&s",
ingredients:["rice","potato","onion"]
},

{
slug:"egg-fried-rice",
name:"Egg Fried Rice",
image:"https://i.ndtvimg.com/i/2018-02/fried-rice_620x330_81519290654.jpg",
ingredients:["rice","egg","carrot","beans"]
},

{
slug:"butter-chicken",
name:"Butter Chicken",
image:"https://sugarspunrun.com/wp-content/uploads/2025/04/Butter-chicken-1-of-1.jpg",
ingredients:["chicken","butter","tomato","cream"]
},

{
slug:"gulab-jamun",
name:"Gulab Jamun",
image:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUTZA1cEtNFBTKDUT8ow1m-3dorJDIO8UDcQ&s",
ingredients:["milk","flour","sugar"]
}

];


/* NORMALIZE TEXT */

function normalize(str){
return str.trim().toLowerCase();
}


/* GENERATE INGREDIENT LIST */

const ingredientSet=new Set();

recipes.forEach(r=>{
r.ingredients.forEach(i=>{
ingredientSet.add(normalize(i));
});
});

const ingContainer=document.getElementById("ingredients");

[...ingredientSet].sort().forEach(i=>{

const label=document.createElement("label");

label.className="ing";

label.innerHTML=`<input type="checkbox" value="${i}"> ${i}`;

ingContainer.appendChild(label);

});


/* GENERATE RECIPE CARDS */

const grid=document.getElementById("recipeGrid");

recipes.forEach(r=>{

const card=document.createElement("div");

card.className="card";

card.setAttribute("data-ing",r.ingredients.map(normalize).join(" "));

card.innerHTML=`

<img src="${r.image}">

<div class="card-content">
<h3>${r.name}</h3>
</div>

`;

card.onclick=()=>window.location="/recipe/"+r.slug;

grid.appendChild(card);

});


/* FIND RECIPES */

function findRecipes(){

const checked=[...document.querySelectorAll(".ingredients input:checked")]
.map(i=>normalize(i.value));

const cards=document.querySelectorAll(".card");

let visible=0;

cards.forEach(card=>{

const ingredients=card.dataset.ing.split(" ");

const match=checked.every(i=>ingredients.includes(i));

if(match){

card.style.display="block";
visible++;

}else{

card.style.display="none";

}

});

document.getElementById("noResults").style.display = visible===0 ? "block":"none";

}

</script>

</body>
</html>
