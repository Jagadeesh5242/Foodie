<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruchique • Recipe Search</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#9B1C31;
--accent:#FF9933;
--cream:#FFF8E7;
--dark:#1a1a1a;
}

body{
font-family:Poppins;
margin:0;
background:var(--cream);
color:var(--dark);
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
}

.logo{
font-family:'Playfair Display';
font-size:28px;
color:var(--primary);
font-weight:900;
}

.nav-links a{
margin-left:20px;
text-decoration:none;
color:var(--primary);
font-weight:600;
border:2px solid var(--primary);
padding:8px 18px;
border-radius:25px;
transition:.3s;
}

.nav-links a:hover{
background:var(--primary);
color:white;
}

/* HERO */
.hero{
text-align:center;
padding:120px 20px 80px;
}

.hero h1{
font-family:'Playfair Display';
font-size:56px;
color:var(--primary);
margin-bottom:10px;
}

.hero p{
font-size:20px;
color:#666;
margin-bottom:40px;
}

/* SEARCH */
.search-big{
display:flex;
justify-content:center;
gap:10px;
position:relative;
width:520px;
margin:auto;
}

.search-big input{
padding:18px 25px;
width:420px;
border-radius:40px;
border:2px solid var(--accent);
font-size:16px;
}

.search-big button{
padding:18px 35px;
border:none;
background:var(--accent);
color:white;
border-radius:40px;
font-weight:600;
cursor:pointer;
}

.search-big button:hover{
background:var(--primary);
}

/* SUGGESTIONS */
.suggestions{
position:absolute;
top:65px;
left:0;
width:420px;
background:white;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
text-align:left;
z-index:100;
}

.suggestion-item{
padding:12px 18px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion-item:hover{
background:#FFF1E6;
}

/* TRENDING */
.section-title{
font-family:'Playfair Display';
text-align:center;
font-size:38px;
color:var(--primary);
margin:80px 0 30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
padding:0 40px;
max-width:1300px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.12);
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.card h3{
font-family:'Playfair Display';
color:var(--primary);
margin:0;
}

.footer{
text-align:center;
padding:40px;
background:white;
margin-top:60px;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">🍽️ RUCHIQUE</div>
<div class="nav-links">
<a href="/browse">Browse Recipes</a>
<a href="/about">About</a>
</div>
</div>

<section class="hero">
<h1>Find Any Recipe in Seconds</h1>
<p>Search ingredients, instructions & cooking steps instantly</p>

<div class="search-big">
<input id="searchInput" onkeyup="showSuggestions()" placeholder="Search chicken biryani, dosa, pasta..." />
<button onclick="searchRecipe()">Search</button>

<div id="suggestions" class="suggestions"></div>
</div>
</section>

<h2 class="section-title">🔥 Trending Recipes</h2>

<div class="grid">

<div class="card" data-name="Chicken Biryani" onclick="openRecipe('chicken-biryani')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFIENTSeyaVBUA5Yfh1HT8iJMWy1raKxxlJQ&s">
<div class="card-content"><h3>Chicken Biryani</h3></div>
</div>

<div class="card" data-name="Masala Dosa" onclick="openRecipe('masala-dosa')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmyC7uis1FdyUpZW9h4OEQYOM9NDbXozIfVg&s">
<div class="card-content"><h3>Masala Dosa</h3></div>
</div>

<div class="card" data-name="Paneer Butter Masala" onclick="openRecipe('paneer-butter-masala')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT85iSF9VSvP3JREyzT2L40ZuxDcpcqegj5IQ&s">
<div class="card-content"><h3>Paneer Butter Masala</h3></div>
</div>

<div class="card" data-name="Gulab Jamun" onclick="openRecipe('gulab-jamun')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUTZA1cEtNFBTKDUT8ow1m-3dorJDIO8UDcQ&s">
<div class="card-content"><h3>Gulab Jamun</h3></div>
</div>

</div>

<div class="footer">© Ruchique 2026 • Discover & Cook</div>

<script>

/* Open recipe */
function openRecipe(slug){
window.location="/recipe/"+slug;
}

/* Search button */
function searchRecipe(){
const keyword=document.getElementById("searchInput").value.toLowerCase();
const cards=document.querySelectorAll(".card");

cards.forEach(card=>{
const name=card.dataset.name.toLowerCase();
if(name.includes(keyword)){
card.click();
}
});
}

/* Suggestions from recipe cards */
function showSuggestions(){

const input=document.getElementById("searchInput").value.toLowerCase();
const box=document.getElementById("suggestions");

box.innerHTML="";

if(input==="") return;

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{

const name=card.dataset.name;

if(name.toLowerCase().includes(input)){

const div=document.createElement("div");
div.classList.add("suggestion-item");
div.innerText=name;

div.onclick=function(){
card.click();
};

box.appendChild(div);

}

});

}

/* Hide suggestions when clicking outside */
document.addEventListener("click",function(e){
if(!document.getElementById("searchInput").contains(e.target)){
document.getElementById("suggestions").innerHTML="";
}
});

</script>

</body>
</html>
