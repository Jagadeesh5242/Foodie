<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment • Ruchique</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--primary:#9B1C31;
--accent:#FF9933;
--cream:#FFF8E7;
--dark:#1a1a1a;
}

body{
margin:0;
font-family:Poppins;
background:var(--cream);
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.logo{
font-family:'Playfair Display';
font-size:28px;
color:var(--primary);
font-weight:900;
}

.nav-links a{
margin-left:20px;
text-decoration:none;
color:var(--primary);
font-weight:600;
border:2px solid var(--primary);
padding:8px 18px;
border-radius:25px;
}

.nav-links a:hover{
background:var(--primary);
color:white;
}

/* PAYMENT BOX */

.container{
max-width:450px;
margin:120px auto;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

h1{
color:var(--primary);
}

.amount{
font-size:28px;
margin:20px 0;
}

.pay-btn{
padding:14px 35px;
background:var(--primary);
color:white;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:10px;
}

.cancel-btn{
padding:14px 35px;
background:#aaa;
color:white;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:10px;
}

.pay-btn:hover{
background:#7a1626;
}

.cancel-btn:hover{
background:#777;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<div class="logo">🍽️ RUCHIQUE</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/browse">Browse Recipes</a>
<a href="/ingredients">Cook with what you have</a>
<a href="/about">About</a>
</div>
</div>

<!-- PAYMENT BOX -->

<div class="container">

<h1>Complete Payment</h1>

<div class="amount">
Amount: ₹<span id="amount">0</span>
</div>

<button class="pay-btn" onclick="pay()">Pay Now</button>

<button class="cancel-btn" onclick="cancelPayment()">Cancel Payment</button>

</div>

<script>

/* Get amount from URL */

const params = new URLSearchParams(window.location.search);

const amount = params.get("amount") || 0;

document.getElementById("amount").innerText = amount;


/* Pay */

function pay(){

alert("Payment Successful 🎉 Redirecting to Home...");

setTimeout(function(){

window.location.href="/";

},2000);

}


/* Cancel */

function cancelPayment(){

if(confirm("Are you sure you want to cancel payment?")){

window.location.href="/browse";

}

}


/* Warn user before leaving */


</script>

</body>
</html>
